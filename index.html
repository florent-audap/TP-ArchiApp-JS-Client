<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plateforme de Messages</title>
  <link href="style.css" rel="stylesheet" type="text/css">
</head>

<body>
  <header>
    <h1>Plateforme de dépôt de messages</h1>
    <button id="theme-toggle">Passer en mode sombre</button>
  </header>

  <main>
    <section id="messages-section">
      <h2>Messages récents</h2>
      <ul id="messages-list">
        <li>Chargement des messages...</li>
      </ul>
      <button id="update-button">Mettre à jour la liste</button>
    </section>

    <hr>

    <section id="post-section">
      <h2>Poster un nouveau message</h2>
      <div class="form-group">
        <label for="pseudo-input">Votre Pseudo :</label>
        <input type="text" id="pseudo-input" placeholder="Ex: JeanDupont">
      </div>
      <div class="form-group">
        <label for="message-input">Message :</label>
        <textarea id="message-input" placeholder="Tapez votre message ici..."></textarea>
      </div>
      <button id="send-button">Envoyer le message</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
